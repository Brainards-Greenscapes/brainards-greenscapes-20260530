[build]
  command = "npm run build"
  publish = "_site"

# --- Canonical host: force apex -> www (GSC showed both hostnames indexed
# separately with different average positions - 4.77 vs 8.9 - splitting
# ranking signals across the same content. Found 2026-07-19.) ---

[[redirects]]
  from = "https://brainardsgreenscapes.com/*"
  to = "https://www.brainardsgreenscapes.com/:splat"
  status = 301
  force = true

# --- 301 Redirects: fix broken URLs indexed by Google ---

[[redirects]]
  from = "/landscape-design-services/"
  to = "/services/landscape-design/"
  status = 301

[[redirects]]
  from = "/landscaping/landscaping-company/"
  to = "/services/landscaping/"
  status = 301

[[redirects]]
  from = "/hardscaping/"
  to = "/services/hardscaping/"
  status = 301

[[redirects]]
  from = "/hardscaping/hardscaping-services/"
  to = "/services/hardscaping/"
  status = 301

[[redirects]]
  from = "/about-us/"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/about-us/faq/"
  to = "/#faq"
  status = 301

[[redirects]]
  from = "/las-cruces-nm/"
  to = "/service-areas/las-cruces-nm/"
  status = 301

[[redirects]]
  from = "/areas-of-service/las-cruces-landscaping-company/"
  to = "/service-areas/las-cruces-nm/"
  status = 301

[[redirects]]
  from = "/contact-us/"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/landscaping/commercial-landscaping-maintenance/"
  to = "/services/landscape-maintenance/"
  status = 301

[[redirects]]
  from = "/other/"
  to = "/services/"
  status = 301

[[redirects]]
  from = "/other/sod-installation-service/"
  to = "/services/landscaping/sod-installation/"
  status = 301

[[redirects]]
  from = "/landscaping/landscaping-services/"
  to = "/services/landscaping/"
  status = 301

[[redirects]]
  from = "/landscaping/landscape-architecture-services/"
  to = "/services/landscape-design/"
  status = 301

# --- Cache headers ---

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"
