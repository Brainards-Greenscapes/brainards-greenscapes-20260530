[build]
  command = "npm run build"
  publish = "_site"

# --- 301 Redirects: fix broken URLs indexed by Google ---

[[redirects]]
  from = "/landscape-design-services/"
  to = "/services/landscape-design/"
  status = 301

[[redirects]]
  from = "/landscaping/landscaping-company/"
  to = "/services/landscaping/"
  status = 301

[[redirects]]
  from = "/hardscaping/"
  to = "/services/hardscaping/"
  status = 301

[[redirects]]
  from = "/hardscaping/hardscaping-services/"
  to = "/services/hardscaping/"
  status = 301

[[redirects]]
  from = "/about-us/"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/about-us/faq/"
  to = "/#faq"
  status = 301

[[redirects]]
  from = "/las-cruces-nm/"
  to = "/service-areas/las-cruces-nm/"
  status = 301

[[redirects]]
  from = "/areas-of-service/las-cruces-landscaping-company/"
  to = "/service-areas/las-cruces-nm/"
  status = 301

# --- Cache headers ---

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"
